<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控糖助手 — Glucose Control Assistant</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #0071e3;
            --border: #d2d2d7;
            --card-bg: #f5f5f7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1d1d1f;
                --text: #f5f5f7;
                --text-secondary: #a1a1a6;
                --accent: #2997ff;
                --border: #424245;
                --card-bg: #2d2d2f;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; max-width: 480px; }
        .icon {
            width: 96px; height: 96px;
            background: linear-gradient(135deg, #34c759, #30d158);
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
        }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 17px; color: var(--text-secondary); margin-bottom: 36px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a {
            display: block;
            padding: 16px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .links a:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.15);
        }
        .links a span {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 2px;
        }
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">🩸</div>
    <h1>控糖助手</h1>
    <p class="subtitle">Glucose Control Assistant</p>

    <div class="links">
        <a href="privacy-policy.html">
            隐私政策 / Privacy Policy
            <span>了解我们如何保护您的数据</span>
        </a>
        <a href="terms-of-service.html">
            使用条款 / Terms of Service
            <span>应用使用条款和订阅说明</span>
        </a>
    </div>

    <div class="footer">
        <p>&copy; 2026 控糖助手. All rights reserved.</p>
        <p><a href="mailto:harrysxu@outlook.com">harrysxu@outlook.com</a></p>
    </div>
</div>
</body>
</html>
